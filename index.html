<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SPIL-X PRO | THERMAL ANALYST</title>
    <script src="https://cdn.plot.ly/plotly-2.24.1.min.js"></script>
    <script src="cordova.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
    <style>
        :root { --neon: #00f2ff; --red: #ff3c00; --orange: #ff9100; --yellow: #ffcc00; --green: #00ff6a; --bg: #000; --panel: rgba(15, 15, 15, 0.95); }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { margin: 0; background: var(--bg); color: white; font-family: 'Rajdhani', sans-serif; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        .hud-header { padding: 10px 15px; border-bottom: 2px solid var(--neon); display: flex; justify-content: space-between; align-items: center; background: #000; z-index: 10; }
        .logo { font-family: 'Orbitron'; font-size: 0.8rem; font-weight: 900; color: var(--neon); letter-spacing: 1px; }
        .content { flex: 1; display: flex; flex-direction: column; overflow-y: auto; padding: 10px; gap: 10px; }
        .dashboard { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
        .stat-card { background: var(--panel); border: 1px solid #222; padding: 10px; text-align: center; border-radius: 8px; }
        .val { font-family: 'Orbitron'; font-size: 1.4rem; color: var(--neon); display: block; }
        .label { font-size: 0.6rem; color: #666; text-transform: uppercase; margin-bottom: 2px; }
        #viewport-container { width: 100%; height: 320px; background: #050505; border: 1px solid #1a1a1a; border-radius: 8px; position: relative; }
        #thermal-engine { width: 100%; height: 100%; }
        .controls { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
        .btn { background: #000; border: 1px solid var(--neon); color: var(--neon); padding: 12px; font-family: 'Orbitron'; font-size: 0.7rem; border-radius: 6px; font-weight: bold; cursor: pointer; transition: 0.2s; }
        .btn:active { background: var(--neon); color: #000; transform: scale(0.98); }
        .btn.active { background: var(--neon); color: #000; box-shadow: 0 0 10px var(--neon); }
        .btn-connect { border-color: var(--green); color: var(--green); grid-column: 1 / 3; }
        .btn-start { border-color: var(--orange); color: var(--orange); grid-column: 1 / 3; }
        .btn-analysis { border-color: var(--neon); background: rgba(0, 242, 255, 0.05); grid-column: 1 / 3; margin-top: 5px; }
        .btn-save { border-color: var(--yellow); color: var(--yellow); }
        .btn-clear { border-color: var(--red); color: var(--red); }
        .analysis-box { background: #050505; border: 1px solid #111; border-radius: 8px; padding: 10px; flex: 1; min-height: 150px; display: flex; flex-direction: column; }
        #log-list { flex: 1; overflow-y: auto; font-family: 'Courier New', monospace; font-size: 0.75rem; color: #aaa; }
        .ai-msg { color: var(--neon); font-weight: bold; padding: 5px; border: 1px dashed var(--neon); margin-bottom: 5px; text-align: center; font-size: 0.7rem; }
        
        /* Dinamik Log Stili */
        .log-entry { 
            padding: 4px 8px; 
            border-bottom: 1px solid #111; 
            display: flex; 
            justify-content: space-between; 
            font-weight: bold;
        }
    </style>
</head>
<body>

<div class="hud-header">
    <div class="logo">SPIL-X PRO | AI ANALYST</div>
    <div id="bt-status" style="font-size: 0.6rem; color: var(--red);">BAĞLANTI YOK</div>
</div>

<div class="content">
    <div class="dashboard">
        <div class="stat-card">
            <span class="label">ANLIK GERİLİM (V)</span>
            <span id="v-val" class="val">--.--</span>
        </div>
        <div class="stat-card">
            <span class="label">KONUM (Y.X)</span>
            <span id="coord-val" class="val">0.0</span>
        </div>
    </div>

    <div class="controls">
        <button class="btn btn-connect" id="conn-btn" onclick="initBT()">CİHAZA BAĞLAN (HC-06)</button>
        <button class="btn btn-start" id="start-btn" onclick="sendCmd('S')" disabled>TARAMAYI BAŞLAT</button>
        <button class="btn active" id="m-2d" onclick="switchMode('heatmap')">TERMAL HARİTA</button>
        <button class="btn" id="m-3d" onclick="switchMode('surface')">3D ANALİZ</button>
        <button class="btn btn-save" onclick="saveDataJSON()">JSON KAYDET</button>
        <button class="btn btn-clear" onclick="clearData()">TEMİZLE</button>
<a href="kontrol.html" class="btn btn-analysis">PRO ANALİZ MERKEZİNE GİT</a>
    </div>

    <div id="viewport-container">
        <div id="thermal-engine"></div>
    </div>

    <div class="analysis-box">
        <div class="label" style="margin-bottom:5px;">CANLI SAHA ANALİZ GÜNLÜĞÜ</div>
        <div id="log-list"><div class="ai-msg">Sistem hazır. Veri bekleniyor...</div></div>
    </div>
</div>

<script>
    let scanData = Array(10).fill().map(() => Array(4).fill(null));
    let currentMode = 'heatmap';
    const lines = ["HAT-1", "HAT-2", "HAT-3", "HAT-4"];

    const thermalColorscale = [
        [0, 'rgb(255, 0, 0)'], [0.25, 'rgb(255, 0, 0)'],
        [0.251, 'rgb(255, 255, 0)'], [0.495, 'rgb(255, 255, 0)'],
        [0.5, 'rgb(0, 255, 106)'], [0.82, 'rgb(0, 255, 106)'],
        [0.825, 'rgb(0, 242, 255)'], [1, 'rgb(0, 242, 255)']
    ];

    document.addEventListener('deviceready', function() {
        pushLog("Sistem Başlatıldı...");
        initGraph();
    }, false);

    function initBT() {
        if (typeof bluetoothSerial !== 'undefined') {
            bluetoothSerial.list(function(devices) {
                let dev = devices.find(d => d.name.includes("HC-06")) || devices[0];
                if(dev) {
                    bluetoothSerial.connect(dev.address, function() {
                        document.getElementById('bt-status').innerText = "BAĞLANDI";
                        document.getElementById('bt-status').style.color = "var(--green)";
                        document.getElementById('conn-btn').style.display = "none";
                        document.getElementById('start-btn').disabled = false;
                        pushLog("Cihaz Bağlantısı Kuruldu.");
                        bluetoothSerial.subscribe('\n', processRawData);
                    }, function() { alert("Bağlantı Hatası!"); });
                }
            });
        }
    }

    function processRawData(data) {
        let d = data.trim();
        if (d.startsWith('{')) {
            try {
                let json = JSON.parse(d);
                let v = json.v;
                document.getElementById('v-val').innerText = v.toFixed(2);
                document.getElementById('coord-val').innerText = `${json.y+1}.${json.x+1}`;
                scanData[json.y][json.x] = v;
                Plotly.restyle('thermal-engine', { z: [scanData] });

                // Voltaj Anlamlandırma ve Renklendirme
                let label = "";
                let color = "";
                
                if (v <= 5.0) { 
                    label = "METAL / İLETKEN"; 
                    color = "var(--red)"; 
                } else if (v <= 9.9) { 
                    label = "MİNERAL"; 
                    color = "var(--yellow)"; 
                } else if (v <= 16.4) { 
                    label = "ZEMİN / TOPRAK"; 
                    color = "var(--green)"; 
                } else { 
                    label = "BOŞLUK / ODA"; 
                    color = "var(--neon)"; 
                }

                // Log Listesine Ekleme
                const entry = document.createElement('div');
                entry.className = 'log-entry';
                entry.style.color = color;
                entry.innerHTML = `<span>[${json.y+1},${json.x+1}] ${v.toFixed(2)}V</span> <span>${label}</span>`;
                
                const logList = document.getElementById('log-list');
                logList.prepend(entry);
                if(logList.children.length > 50) logList.lastChild.remove(); // Hafıza yönetimi

            } catch(e) {}
        }
    }

    function initGraph() {
        const trace = { z: scanData, x: lines, type: currentMode, colorscale: thermalColorscale, zmin: 0, zmax: 20, zsmooth: 'best' };
        const layout = { paper_bgcolor: '#000', plot_bgcolor: '#000', margin: { t: 10, b: 20, l: 30, r: 10 }, xaxis: { gridcolor: '#111' }, yaxis: { autorange: 'reversed', gridcolor: '#111' } };
        Plotly.newPlot('thermal-engine', [trace], layout, {responsive: true, displayModeBar: false});
    }

    function switchMode(m) { currentMode = m; initGraph(); }

    function sendCmd(c) {
        if (typeof bluetoothSerial !== 'undefined') {
            bluetoothSerial.write(c, function() { pushLog("Tarama Komutu Gönderildi."); });
        }
    }

function goToAnalysis() {
    // Mevcut dosyanın tam yolunu al (örn: file:///android_asset/www/index.html)
    var currentPath = window.location.href;
    
    // index.html kısmını silip yerine kontrol.html ekle
    var targetPath = currentPath.replace("index.html", "test.html");
    
    // Eğer sonda başka parametreler varsa onları da temizlemek için:
    targetPath = targetPath.split('#')[0].split('?')[0];

    console.log("Gidilecek Yerel Yol: " + targetPath);
    window.location.href = targetPath;
}

    function saveDataJSON() {
        const fileName = "SPILX_DATA_" + Date.now() + ".json";
        const content = JSON.stringify({ cihaz: "SPIL-X PRO", tarih: new Date().toLocaleString(), veriler: scanData }, null, 2);
        if (typeof cordova !== 'undefined') {
            const path = cordova.file.externalRootDirectory + "Download/"; 
            window.resolveLocalFileSystemURL(path, function(dir) {
                dir.getFile(fileName, { create: true }, function(fileEntry) {
                    fileEntry.createWriter(function(fw) {
                        fw.onwriteend = function() { alert("Kaydedildi: " + fileName); };
                        fw.write(new Blob([content], { type: 'application/json' }));
                    });
                });
            });
        }
    }

    function clearData() {
        if(!confirm("Silinsin mi?")) return;
        scanData = Array(10).fill().map(() => Array(4).fill(null));
        initGraph();
        document.getElementById('log-list').innerHTML = '';
    }

    function pushLog(m) {
        const div = document.createElement('div');
        div.className = 'ai-msg';
        div.innerText = m;
        document.getElementById('log-list').prepend(div);
    }
</script>
</body>
</html>
