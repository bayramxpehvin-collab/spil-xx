<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SPIL-X PRO | THERMAL ANALYST</title>
    <script src="https://cdn.plot.ly/plotly-2.24.1.min.js"></script>
    <script src="cordova.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
    <style>
        :root { 
            --neon: #00f2ff; 
            --red: #ff3c00; 
            --orange: #ff9100; 
            --yellow: #ffcc00; 
            --green: #00ff6a; 
            --deep-blue: #0033ff; /* Koyu Mavi */
            --bg: #000; 
            --panel: rgba(15, 15, 15, 0.95); 
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { margin: 0; background: var(--bg); color: white; font-family: 'Rajdhani', sans-serif; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        .hud-header { padding: 10px 15px; border-bottom: 2px solid var(--neon); display: flex; justify-content: space-between; align-items: center; background: #000; z-index: 10; }
        .logo { font-family: 'Orbitron'; font-size: 0.8rem; font-weight: 900; color: var(--neon); letter-spacing: 1px; }
        .content { flex: 1; display: flex; flex-direction: column; overflow-y: auto; padding: 10px; gap: 10px; }
        .dashboard { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
        .stat-card { background: var(--panel); border: 1px solid #222; padding: 10px; text-align: center; border-radius: 8px; }
        .val { font-family: 'Orbitron'; font-size: 1.4rem; color: var(--neon); display: block; }
        .label { font-size: 0.6rem; color: #666; text-transform: uppercase; }
        #viewport-container { width: 100%; height: 320px; background: #050505; border: 1px solid #1a1a1a; border-radius: 8px; position: relative; }
        #thermal-engine { width: 100%; height: 100%; }
        .controls { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
        .btn { background: #000; border: 1px solid var(--neon); color: var(--neon); padding: 12px; font-family: 'Orbitron'; font-size: 0.7rem; border-radius: 6px; font-weight: bold; cursor: pointer; transition: 0.2s; }
        .btn:active { background: var(--neon); color: #000; transform: scale(0.98); }
        .btn.active { background: var(--neon); color: #000; box-shadow: 0 0 10px var(--neon); }
        .btn-connect { border-color: var(--green); color: var(--green); grid-column: 1 / 3; }
        .btn-start { border-color: var(--orange); color: var(--orange); grid-column: 1 / 3; }
        .btn-save { border-color: var(--yellow); color: var(--yellow); }
        .btn-clear { border-color: var(--red); color: var(--red); }
        .analysis-box { background: #050505; border: 1px solid #111; border-radius: 8px; padding: 10px; flex: 1; min-height: 150px; display: flex; flex-direction: column; }
        #log-list { flex: 1; overflow-y: auto; font-family: 'Courier New', monospace; font-size: 0.75rem; color: #aaa; }
        .ai-msg { color: var(--neon); font-weight: bold; padding: 5px; border: 1px dashed var(--neon); margin-bottom: 5px; text-align: center; font-size: 0.7rem; }
        
        /* Log Satırı Stili */
       .log-entry { 
    padding: 6px 4px; 
    border-bottom: 1px solid #111; 
    display: grid;
    grid-template-columns: 1.2fr 1fr 1.5fr; /* Hat | Voltaj | Anlam sütunları */
    gap: 5px;
    font-weight: bold;
}
        .hat-label { 
    color: #fff; 
    background: #222; 
    padding: 0 4px; 
    border-radius: 3px; 
    font-size: 0.65rem; 
    text-align: center;
}
        @keyframes blink { from { background: rgba(255,255,255,0.1); } to { background: transparent; } }
    </style>
</head>
<body>

<div class="hud-header">
    <div class="logo">SPIL-X PRO | AI ANALYST</div>
    <div id="bt-status" style="font-size: 0.6rem; color: var(--red);">BAĞLANTI YOK</div>
</div>

<div class="content">
    <div class="dashboard">
        <div class="stat-card">
            <span class="label">GERİLİM (V)</span>
            <span id="v-val" class="val">--.--</span>
        </div>
        <div class="stat-card">
            <span class="label">KOORDİNAT</span>
            <span id="coord-val" class="val">0.0</span>
        </div>
    </div>

    <div class="controls">
        <button class="btn btn-connect" id="conn-btn" onclick="initBT()">CİHAZA BAĞLAN (HC-06)</button>
        <button class="btn btn-start" id="start-btn" onclick="sendCmd('S')" disabled>TARAMAYI BAŞLAT</button>
        <button class="btn active" id="m-2d" onclick="switchMode('heatmap')">TERMAL HARİTA</button>
        <button class="btn" id="m-3d" onclick="switchMode('surface')">3D ANALİZ</button>
        <button class="btn btn-save" onclick="saveDataJSON()">JSON KAYDET</button>
        <button class="btn btn-clear" onclick="clearData()">TEMİZLE</button>
    </div>

    <div id="viewport-container">
        <div id="thermal-engine"></div>
    </div>

    <div class="analysis-box">
        <div class="label" style="margin-bottom:5px;">SAHA VERİ GÜNLÜĞÜ</div>
        <div id="log-list"><div class="ai-msg">Sistem hazır.</div></div>
    </div>
</div>

<script>
    let scanData = Array(10).fill().map(() => Array(4).fill(null));
    let currentMode = 'heatmap';
    const lines = ["HAT-1", "HAT-2", "HAT-3", "HAT-4"];

  const thermalColorscale = [
    [0.0, 'rgb(255, 0, 0)'],     // 0V - 11.9V -> METAL (Kırmızı)
    [0.34, 'rgb(255, 0, 0)'],
    [0.35, 'rgb(255, 255, 0)'],   // 12V - 19.9V -> MİNERAL (Sarı)
    [0.56, 'rgb(255, 255, 0)'],
    [0.57, 'rgb(0, 255, 106)'],   // 20V - 27.9V -> ZEMİN (Yeşil)
    [0.79, 'rgb(0, 255, 106)'],
    [0.80, 'rgb(0, 51, 255)'],    // 28V ve Üstü -> BOŞLUK (Koyu Mavi)
    [1.0, 'rgb(0, 51, 255)']
];
    document.addEventListener('deviceready', function() {
        pushLog("Sistem Başlatıldı...");
        requestPermissions();
        initGraph();
    }, false);

    function requestPermissions() {
        if (typeof cordova !== 'undefined' && cordova.plugins.permissions) {
            const p = cordova.plugins.permissions;
            p.requestPermissions([p.BLUETOOTH_SCAN, p.BLUETOOTH_CONNECT, p.ACCESS_FINE_LOCATION, p.WRITE_EXTERNAL_STORAGE], 
            function(s) { pushLog("İzinler Tamam."); }, function() { alert("İzin Hatası!"); });
        }
    }

    function initBT() {
        if (typeof bluetoothSerial !== 'undefined') {
            bluetoothSerial.list(function(devices) {
                let dev = devices.find(d => d.name.includes("HC-06")) || devices[0];
                if(dev) {
                    pushLog("Bağlanıyor: " + dev.name);
                    bluetoothSerial.connect(dev.address, function() {
                        document.getElementById('bt-status').innerText = "BAĞLANDI";
                        document.getElementById('bt-status').style.color = "var(--green)";
                        document.getElementById('conn-btn').style.display = "none";
                        document.getElementById('start-btn').disabled = false;
                        pushLog("Bağlantı Başarılı!");
                        bluetoothSerial.subscribe('\n', processRawData);
                    }, function() { alert("Bağlantı Hatası!"); });
                } else { alert("Eşleşmiş cihaz yok!"); }
            }, function() { alert("Liste Hatası"); });
        }
    }

function processRawData(data) {
    let d = data.trim();
    if (d.startsWith('{')) {
        try {
            let json = JSON.parse(d);
            let volt = json.v;
            let y = json.y; // Satır numarası
            let x = json.x; // Hat/Sütun indeksi (0-3)

            // Üstteki göstergeleri güncelle
            document.getElementById('v-val').innerText = volt.toFixed(2);
            document.getElementById('coord-val').innerText = `${lines[x]} / ${y+1}`;
            
            // Veriyi diziye işle ve grafiği güncelle
            scanData[y][x] = volt;
            Plotly.restyle('thermal-engine', { z: [scanData] });

         // 28.0V VE ÜZERİ BOŞLUK MANTIĞI
let anlam = ""; let renk = "";

if (volt >= 28.0) { 
    anlam = "BOŞLUK / ODA"; 
    renk = "var(--deep-blue)"; // Mavi
}
else if (volt >= 20.0) { 
    anlam = "ZEMİN (NORMAL)"; 
    renk = "var(--green)"; // Yeşil
}
else if (volt >= 12.0) { 
    anlam = "MİNERAL / NEM"; 
    renk = "var(--yellow)"; // Sarı
}
else { 
    anlam = "METAL / İLETKEN"; 
    renk = "var(--red)"; // Kırmızı
}
            // Log satırına HAT bilgisini ekle
            const entry = document.createElement('div');
            entry.className = 'log-entry';
            entry.style.color = renk;
            entry.innerHTML = `
                <span class="hat-label">${lines[x]}</span>
                <span>${volt.toFixed(2)}V</span>
                <span style="text-align:right;">${anlam}</span>
            `;
            
            const logList = document.getElementById('log-list');
            logList.prepend(entry);
            
            // Liste çok uzamasın diye eski kayıtları temizle
            if (logList.children.length > 40) logList.lastChild.remove();

        } catch(e) { console.log("JSON Hatası: " + e); }
    }
}

    function initGraph() {
    const trace = { 
        z: scanData, 
        x: lines, 
        type: currentMode, 
        colorscale: thermalColorscale,
        zmin: 0, 
        zmax: 35, // 20 olan değeri 35 yaptık
        zsmooth: currentMode === 'heatmap' ? 'best' : false,
        showscale: true
    };
        const layout = { 
            paper_bgcolor: '#000', plot_bgcolor: '#000', 
            margin: { t: 10, b: 20, l: 30, r: 10 },
            xaxis: { gridcolor: '#111' }, yaxis: { autorange: 'reversed', gridcolor: '#111' }
        };
        Plotly.newPlot('thermal-engine', [trace], layout, {responsive: true, displayModeBar: false});
    }

    function switchMode(m) { 
        currentMode = m; 
        document.getElementById('m-2d').classList.toggle('active', m === 'heatmap');
        document.getElementById('m-3d').classList.toggle('active', m === 'surface');
        initGraph(); 
    }

    function sendCmd(c) {
        if (typeof bluetoothSerial !== 'undefined') {
            bluetoothSerial.write(c, function() { pushLog("Tarama Başlatıldı."); });
        }
    }

    function saveDataJSON() {
        const fileName = "SPILX_DATA_" + Date.now() + ".json";
        const content = JSON.stringify({
            cihaz: "SPIL-X PRO",
            tarih: new Date().toLocaleString(),
            veriler: scanData
        }, null, 2);

        if (typeof cordova !== 'undefined') {
            const path = cordova.file.externalRootDirectory + "Download/"; 
            window.resolveLocalFileSystemURL(path, function(dir) {
                dir.getFile(fileName, { create: true }, function(fileEntry) {
                    fileEntry.createWriter(function(fileWriter) {
                        fileWriter.onwriteend = function() { alert("Dosya Kaydedildi:\n" + fileName); };
                        fileWriter.write(new Blob([content], { type: 'application/json' }));
                    });
                });
            }, function(err) { alert("Klasör Erişim Hatası!"); });
        } else {
            console.log(content);
            alert("Sadece APK modunda dosyaya yazar.");
        }
    }

    function clearData() {
        if(!confirm("Silinsin mi?")) return;
        scanData = Array(10).fill().map(() => Array(4).fill(null));
        initGraph();
        document.getElementById('log-list').innerHTML = '';
        pushLog("Hafıza temizlendi.");
    }

    function pushLog(m) {
        const div = document.createElement('div');
        div.className = 'ai-msg';
        div.innerText = m;
        document.getElementById('log-list').prepend(div);
    }
</script>
</body>
</html>
