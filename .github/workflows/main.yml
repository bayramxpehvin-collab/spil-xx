name: Build APK
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
      - name: Install Cordova
        run: npm install -g cordova
      - name: Create Project
        run: |
          cordova create build_folder com.spilx.analyst "SPIL-X_PRO"
          rm build_folder/www/index.html
          cp index.html build_folder/www/
          cp config.xml build_folder/
          cd build_folder
          cordova platform add android
          cordova plugin add cordova-plugin-bluetooth-serial
          cordova plugin add cordova-plugin-file
          cordova plugin add cordova-plugin-android-permissions
      - name: Build Android APK
        run: |
          cd build_folder
          cordova build android --no-telemetry
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Spil-X-Pro-Paketi
          path: build_folder/platforms/android/app/build/outputs/apk/debug/app-debug.apk
